coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 2%
    patch:
      default:
        target: 90%

flags:
  unit:
    paths:
      - src/
    carryforward: true

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "dist/**"
  - "docs/**"
  - "tests/**"
